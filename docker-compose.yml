services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pitwall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pitwall
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: pitwall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitwall -d pitwall"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
